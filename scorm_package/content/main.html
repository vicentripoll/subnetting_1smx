<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Subnetting - SMX</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <header class="hero">
      <div class="hero-copy">
        <div class="badge">💡 Redes · SMX</div>
        <h1>Subnetting - FLSM</h1>
        <p class="subtitle">Herramienta educativa interactiva para aprender subnetting paso a paso.</p>
      </div>
      <div class="hero-visual">
        <img src="assets/network-illustration.svg" alt="Ilustración de redes y subnetting" />
      </div>
    </header>

    <div class="home-grid">
      <a href="calculadora.html" class="home-card">
        <div class="home-card-icon">🧮</div>
        <h2>Calculadora de Redes</h2>
        <p>Explora el subnetting paso a paso.</p>
        <div class="home-card-footer"><span class="home-card-badge">Aprender</span></div>
      </a>
      <a href="exercises.html" class="home-card">
        <div class="home-card-icon">📚</div>
        <h2>Ejercicios Progresivos</h2>
        <p>Resuelve ejercicios con validación automática.</p>
        <div class="home-card-footer"><span class="home-card-badge">Practicar</span></div>
      </a>
    </div>
  </div>
  <style>
    body { margin: 0; background: #f8fafc; color: #0f172a; font-family: Arial, sans-serif; }
    .container { max-width: 1100px; margin: 0 auto; padding: 24px; }
    .hero { display: grid; grid-template-columns: 1.2fr 0.8fr; gap: 24px; align-items: center; background: linear-gradient(135deg, #eff6ff, #ffffff); border-radius: 24px; padding: 24px; }
    .badge { display: inline-block; padding: 8px 12px; background: #dbeafe; color: #1d4ed8; border-radius: 999px; font-weight: 700; margin-bottom: 12px; }
    .subtitle { color: #475569; line-height: 1.6; }
    .hero img { width: 100%; max-width: 320px; display: block; margin: 0 auto; }
    .home-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin-top: 24px; }
    .home-card { text-decoration: none; color: inherit; background: white; border: 1px solid #dbeafe; border-radius: 16px; padding: 24px; box-shadow: 0 8px 24px rgba(15,23,42,0.06); }
    .home-card-icon { font-size: 2.5rem; margin-bottom: 10px; }
    .home-card h2 { margin: 0 0 8px; font-size: 1.2rem; }
    .home-card p { color: #475569; line-height: 1.5; }
    .home-card-footer { margin-top: 12px; }
    .home-card-badge { display: inline-block; padding: 8px 12px; background: #2563eb; color: white; border-radius: 999px; font-size: 0.9rem; }
    @media (max-width: 768px) { .hero { grid-template-columns: 1fr; } }
  </style>
</body>
</html>
